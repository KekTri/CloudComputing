---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: analytics-job
  namespace: mobility
spec:
  schedule: "0 * * * *"   # Every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: analytics
              image: ghcr.io/kektri/cloudcomputing/analytics-service:latest
              env:
                - name: RIDE_MONGO_URL
                  value: "mongodb://mongo:27017"
                - name: ANALYTICS_MONGO_URL
                  value: "mongodb://mongo:27017"
                - name: SPARK_HOST
                  value: "10.3.15.18:15012"
                - name: SPARK_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: spark-credentials
                      key: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  namespace: mobility
spec:
  replicas: 0
  selector:
    matchLabels:
      app: analytics-api
  template:
    metadata:
      labels:
        app: analytics-api
    spec:
      containers:
        - name: analytics-api
          image: ghcr.io/kektri/cloudcomputing/analytics-api:latest
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "64Mi"
          env:
            - name: ANALYTICS_MONGO_URL
              value: "mongodb://mongo:27017"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-api
  namespace: mobility
spec:
  selector:
    app: analytics-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: analytics-api-route
  namespace: mobility
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /analytics
      backendRefs:
        - name: analytics-api
          port: 80
