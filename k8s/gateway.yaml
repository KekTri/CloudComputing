---
# HTTPRoute for ride-service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ride-service-route
  namespace: mobility
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /rides
      backendRefs:
        - name: ride-service
          port: 80
