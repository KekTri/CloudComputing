---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-customer-pvc
  namespace: mobility
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-customer
  namespace: mobility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-customer
  template:
    metadata:
      labels:
        app: mongo-customer
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-customer-storage
              mountPath: /data/db
      volumes:
        - name: mongo-customer-storage
          persistentVolumeClaim:
            claimName: mongo-customer-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-customer
  namespace: mobility
spec:
  selector:
    app: mongo-customer
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: mobility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: ghcr.io/kektri/cloudcomputing/customer-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              value: "mongodb://mongo-customer:27017"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: mobility
spec:
  selector:
    app: customer-service
  ports:
    - port: 80
      targetPort: 8000
